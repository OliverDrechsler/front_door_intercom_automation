name: build github_pages documentation
on:
  push:
    # branches: "**"
     branches:
      - master


permissions:
  contents: write
 
jobs:
 
  build_docs_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: prepare env
        run: |
          sudo apt-get update
          sudo apt-get install -y git rsync python3-pip
        shell: bash

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install sphinx sphinx-rtd-theme sphinx_md ghp-import myst-parser
        shell: bash

      - name: Generate Changelog from GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# ChangeLog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          gh api repos/${{ github.repository }}/releases?per_page=50 --jq '.[] | select(.draft==false and .prerelease==false) | "# " + .tag_name + " - " + (.name // .tag_name) + " (" + (.published_at | split("T")[0]) + ")\n\n" + (.body // "") + "\n\n"' >> CHANGELOG.md
        shell: bash

      - name: Build HTML
        run: |
          make html
        shell: bash

      - name: Run ghp-import
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | 
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ghp-import -n -f _build/html
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        shell: bash

